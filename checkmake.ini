#
# checkmake (https://github.com/checkmake/checkmake) configuration; tunes the
# Makefile linter run by `make checkmake` and the CI job of the same name.
#
# maxbodylength: the default cap is 5 lines, but the `install` recipe is a
# straight-line sequence of `install` commands that legitimately runs to 7;
# 10 keeps the rule useful (catching genuinely overgrown recipes) without
# flagging it.
[maxbodylength]
maxBodyLength = 10
