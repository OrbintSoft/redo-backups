# SPDX-License-Identifier: EUPL-1.2
name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Re-run the full quality gate; a release is only cut if this passes.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then echo "$unformatted"; exit 1; fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - run: "$(go env GOPATH)/bin/golangci-lint run ./..."

  release:
    name: Tag & release
    needs: test
    runs-on: ubuntu-latest
    # Only release from the canonical repository, never from forks.
    if: github.repository == 'OrbintSoft/redo-backups'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Compute the next version from conventional commits, defaulting to a patch
      # bump when commit messages are not conventional. Starts at v0.0.1.
      - name: Determine version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Fetch the new tag
        if: steps.tag.outputs.new_tag != ''
        run: git fetch --tags --force

      - uses: actions/setup-go@v5
        if: steps.tag.outputs.new_tag != ''
        with:
          go-version: stable
          cache: true

      # snapcraft is required by GoReleaser to build the snap artifact.
      - name: Install snapcraft
        if: steps.tag.outputs.new_tag != ''
        run: sudo snap install snapcraft --classic

      - name: Run GoReleaser
        if: steps.tag.outputs.new_tag != ''
        uses: goreleaser/goreleaser-action@v6
        with:
          # Track the newest GoReleaser (incl. future v3); a major bump may need
          # changes to .goreleaser.yaml, which the release run would surface.
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
