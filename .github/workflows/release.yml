# SPDX-License-Identifier: EUPL-1.2
name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Re-run the full quality gate; a release is only cut if this passes.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...
      # Version pinned and bumped by Renovate (renovate.json5). golangci-lint
      # also enforces gofumpt formatting (see .golangci.yml), so no separate
      # gofmt check is needed here.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - run: '"$(go env GOPATH)/bin/golangci-lint" run ./...'

  # End-to-end backup/restore in a Vagrant VM (reusable workflow). The release
  # is gated on this, so it runs on every push to a release branch. The suite
  # needs nested KVM, so only run it on the canonical repository.
  integration:
    name: Integration
    needs: test
    if: github.repository == 'OrbintSoft/redo-backups'
    uses: ./.github/workflows/integration.yml

  release:
    name: Tag & release
    needs: [test, integration]
    runs-on: ubuntu-latest
    # Only release from the canonical repository, never from forks.
    if: github.repository == 'OrbintSoft/redo-backups'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Compute the next version from conventional commits, defaulting to a patch
      # bump when commit messages are not conventional. Starts at v0.0.1.
      - name: Determine version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Fetch the new tag
        if: steps.tag.outputs.new_tag != ''
        run: git fetch --tags --force

      - uses: actions/setup-go@v6
        if: steps.tag.outputs.new_tag != ''
        with:
          go-version-file: go.mod
          cache: true

      # snapcraft is required by GoReleaser to build the snap artifact.
      - name: Install snapcraft
        if: steps.tag.outputs.new_tag != ''
        run: sudo snap install snapcraft --classic

      - name: Run GoReleaser
        if: steps.tag.outputs.new_tag != ''
        uses: goreleaser/goreleaser-action@v7
        with:
          # Version pinned and bumped by Renovate (.github/renovate.json5). A
          # major bump may need changes to .goreleaser.yaml, which the release run
          # would surface.
          version: "v2.16.0" # renovate: goreleaser
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
