# SPDX-License-Identifier: EUPL-1.2
name: Integration

# Expensive end-to-end backup/restore tests in a Vagrant VM. Manual only.
on:
  workflow_dispatch:
    inputs:
      layouts:
        description: "Space-separated layout names to run (empty = all)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  integration:
    name: Vagrant backup/restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The binary is built on the host and shared into the VM (no Go in the VM).
      - name: Build redo-backup
        run: make build

      # GitHub-hosted Linux runners expose /dev/kvm; make it usable for libvirt.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Ubuntu 24.04 no longer ships a 'vagrant' package, so install it from the
      # official HashiCorp apt repository.
      - name: Install Vagrant (HashiCorp) + libvirt
        run: |
          wget -qO- https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            vagrant \
            libvirt-daemon-system libvirt-dev qemu-system-x86 dnsmasq-base ebtables \
            ruby-dev build-essential pkg-config rsync
          sudo systemctl enable --now libvirtd

      # The vagrant-libvirt plugin must be compiled against the system libvirt
      # while linking against Vagrant's embedded libraries. Install it under sudo
      # so it lives in root's ~/.vagrant.d, matching the sudo 'vagrant up' below.
      - name: Install vagrant-libvirt plugin
        run: |
          sudo CONFIGURE_ARGS="with-ldflags=-L/opt/vagrant/embedded/lib with-libvirt-include=/usr/include/libvirt with-libvirt-lib=/usr/lib/x86_64-linux-gnu" \
            vagrant plugin install vagrant-libvirt

      # All vagrant commands run under plain sudo (HOME=/root) so they find the
      # vagrant-libvirt plugin installed above. The provider is given explicitly.
      - name: Bring up the VM and run the suite
        working-directory: test/integration
        run: |
          sudo vagrant up --provider=libvirt
          sudo vagrant ssh -c "sudo LAYOUTS='${{ inputs.layouts }}' /vagrant/run-tests.sh"

      - name: Tear down
        if: always()
        working-directory: test/integration
        run: sudo vagrant destroy -f || true
