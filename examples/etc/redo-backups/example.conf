#
# Example redo-backups profile.
#
# Install profiles under /etc/redo-backups/<profile>.conf and run them with:
#     redo-backup run <profile>
#
# Each "<profile>.conf" may be extended by drop-in files in
# "<profile>.conf.d/*.conf", which are applied in lexical order; later values
# (and drop-ins) override earlier ones. See example.conf.d/ next to this file.
#
# Syntax: "key = value", one per line. Lines starting with '#' are comments.
# Values may be wrapped in single or double quotes. Unknown keys are rejected.

# --- Required ---------------------------------------------------------------

# dest: destination directory for the backup files (the .redo descriptor and
# the .img chunks are written here). Required.
dest = /mnt/backup

# --- Target selection -------------------------------------------------------

# drive: whole drive to back up, given as the device name without "/dev/".
# Use "auto" to detect the drive that hosts the root filesystem.
# Default: auto
drive = auto

# parts: which partitions to image. Use "auto" for every partition of the
# drive, or a comma/space separated list of partition names.
# Examples: parts = auto        |  parts = sda1, sda2  |  parts = sda1 sda2
# Default: auto
parts = auto

# --- Descriptor metadata ----------------------------------------------------

# id: backup identifier; becomes the file name prefix (<id>.redo, <id>_<dev>_*).
# Leave empty to derive it from the current date (YYYYMMDD).
# Default: (empty -> date)
#id =

# notes: free-text note stored in the .redo descriptor.
# Default: (empty)
notes = Example backup

# version: Redo Rescue on-disk format version to write. Change only if you must
# target a different Redo Rescue release.
# Default: 4.0.0
#version = 4.0.0

# --- Imaging options --------------------------------------------------------

# compressor: compression tool. "pigz" (parallel, faster) or "gzip".
# Both produce gzip-compatible .img chunks.
# Default: pigz
compressor = pigz

# split_size: size of each .img chunk, passed to split(1) (e.g. 4096M, 2G).
# Default: 4096M (4 GiB, matching Redo Rescue)
split_size = 4096M

# --- Live consistency strategy ---------------------------------------------

# consistency: how to keep mounted filesystems consistent while imaging.
#   none      Image the live device as-is. Fastest, no requirements, but NOT
#             crash-consistent; only safe for idle/read-mostly data.
#   fsfreeze  Freeze the partition's mounted filesystem (fsfreeze -f) during
#             imaging and thaw it afterwards. Crash-consistent; briefly blocks
#             writes. Use this for directly-formatted partitions, btrfs included.
#   lvm       For an LVM physical-volume partition (fstype LVM2_member): freeze
#             every mounted filesystem on the PV's logical volumes, then image
#             the PV partition raw (the same unit Redo Rescue restores). Keeps
#             the backup restorable from the Redo Rescue live CD.
# Default: none
consistency = fsfreeze
