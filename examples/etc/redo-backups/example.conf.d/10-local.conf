#
# Example drop-in for the "example" profile.
#
# Files in <profile>.conf.d/ are merged on top of <profile>.conf in lexical
# order; later files and keys override earlier ones. This lets you keep a shared
# base profile under version control and apply host-specific overrides here
# without editing the base file.
#
# This drop-in overrides a couple of settings from example.conf:

# Send this host's backups to a different destination.
dest = /mnt/nas/backups/example

# Only image the EFI and boot partitions on this host.
parts = sda1, sda2
